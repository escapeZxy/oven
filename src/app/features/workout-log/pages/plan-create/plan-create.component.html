<div class="min-h-screen bg-slate-50 pb-24">
  <!-- Header -->
  <div class="bg-white border-b border-slate-200 sticky top-0 z-30">
    <div class="mx-auto flex min-h-16 max-w-5xl flex-col gap-3 px-4 py-3 sm:flex-row sm:items-center sm:justify-between sm:px-6">
      <div class="flex min-w-0 items-center gap-3 sm:gap-4">
        <button mat-icon-button (click)="cancel()">
          <mat-icon>arrow_back</mat-icon>
        </button>
        <h1 class="truncate text-lg font-bold text-slate-900 sm:text-xl">创建新计划</h1>
      </div>
      <div class="flex w-full gap-3 sm:w-auto">
        <button mat-button class="flex-1 sm:flex-none" (click)="cancel()">取消</button>
        <button mat-flat-button color="primary" (click)="onSubmit()" [disabled]="form.invalid" class="!rounded-lg flex-1 sm:flex-none">
          保存计划
        </button>
      </div>
    </div>
  </div>

  <main class="mx-auto max-w-5xl px-4 py-6 sm:px-6 sm:py-8">
    <form [formGroup]="form" class="space-y-8">
      <!-- Basic Info Section -->
      <section class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
        <h2 class="text-lg font-bold text-slate-900 mb-4 flex items-center gap-2">
          <mat-icon class="text-indigo-500">info</mat-icon>
          基本信息
        </h2>
        <div class="grid gap-6">
          <mat-form-field appearance="outline" class="w-full">
            <mat-label>计划名称</mat-label>
            <input matInput formControlName="name" required placeholder="例如：强力增肌 5x5" />
            <mat-error>请输入计划名称</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="w-full">
            <mat-label>计划描述</mat-label>
            <textarea matInput formControlName="description" rows="3" placeholder="描述这个计划的目标和适合人群..."></textarea>
          </mat-form-field>
        </div>
      </section>

      <!-- Training Schedule Section -->
      <section class="space-y-6">
        <div class="flex items-center justify-between">
          <h2 class="text-lg font-bold text-slate-900 flex items-center gap-2">
            <mat-icon class="text-indigo-500">calendar_today</mat-icon>
            训练日程
          </h2>
        </div>

        <!-- The Recursive Schedule List Component -->
        <app-schedule-list [formArray]="schedule"></app-schedule-list>

      </section>
    </form>
  </main>
</div>
